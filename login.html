<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - SOLUVENCON</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #E63946;
            --secondary: #F4A261;
            --accent: #2A9D8F;
            --dark: #5D4037;
            --light: #FFF8E7;
            --white: #FFFFFF;
            --gray: #6c757d;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--dark) 0%, var(--secondary) 100%);
            padding: 20px;
        }

        .login-box {
            background: var(--white);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }
        
        .logo span { color: var(--primary); }
        .subtitle { color: var(--gray); margin-bottom: 30px; }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: var(--dark);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover:not(:disabled) { 
            background: #d32f3f; 
            transform: translateY(-2px);
        }
        
        button:disabled { 
            background: #ccc; 
            cursor: not-allowed; 
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray);
            text-decoration: none;
            margin-top: 20px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .rol-info {
            background: var(--light);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: var(--gray);
        }

        .rol-info i {
            color: var(--accent);
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <a href="index.html" class="logo"><i class="fas fa-utensils"></i> SOLU<span>VENCON</span></a>
        <p class="subtitle">Ingresa tus credenciales para continuar</p>
        
        <div class="rol-info">
            <i class="fas fa-info-circle"></i>
            Acceso para administradores y domiciliarios
        </div>
        
        <div class="error" id="error"></div>
        
        <form id="formLogin">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Usuario</label>
                <input type="text" id="usuario" placeholder="Ej: Juan Pérez" required>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Contraseña</label>
                <input type="password" id="password" placeholder="Tu contraseña" required>
            </div>
            
            <button type="submit" id="btnLogin">
                <i class="fas fa-sign-in-alt"></i> Ingresar
            </button>
        </form>
        
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
    </div>

    <script src="assets/js/config.js"></script>
    <script>
        document.getElementById("formLogin").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            const usuario = document.getElementById("usuario").value.trim();
            const password = document.getElementById("password").value.trim();
            const errorDiv = document.getElementById("error");
            const btn = document.getElementById("btnLogin");
            
            errorDiv.style.display = "none";
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando...';
            
            try {
                const url = `${API_URL}?action=login&nombre=${encodeURIComponent(usuario)}&password=${encodeURIComponent(password)}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.success) {
                    guardarSesion(data.rol, data.nombre, data.id);
                    
                    if (data.rol === "admin") {
                        window.location.href = "admin.html";
                    } else if (data.rol === "domiciliario") {
                        window.location.href = "domiciliario.html";
                    }
                } else {
                    errorDiv.textContent = data.error || "Credenciales incorrectas";
                    errorDiv.style.display = "block";
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Ingresar';
                }
            } catch (err) {
                errorDiv.textContent = "Error de conexión. Intenta de nuevo.";
                errorDiv.style.display = "block";
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Ingresar';
            }
        });
    </script>

</body>
</html>
