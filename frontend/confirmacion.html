<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado - DOMICILIOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #E63946;
            --secondary: #F4A261;
            --accent: #2A9D8F;
            --dark: #5D4037;
            --light: #FFF8E7;
            --white: #FFFFFF;
            --success: #28a745;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--dark) 0%, var(--secondary) 100%);
            padding: 20px;
        }

        .confirmacion-box {
            background: var(--white);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icono-exito {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--success), #20c997);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            animation: scaleIn 0.5s ease 0.2s both;
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .icono-exito i {
            font-size: 3rem;
            color: white;
        }

        h1 {
            color: var(--dark);
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }

        p {
            color: #666;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .info-box {
            background: var(--light);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            text-align: left;
        }

        .info-box p {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .info-box p:last-child {
            margin-bottom: 0;
        }

        .info-box strong {
            color: var(--dark);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(230,57,70,0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(230,57,70,0.5);
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
            margin-top: 1rem;
        }

        .btn-whatsapp:hover {
            background: #128C7E;
            transform: translateY(-3px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }
        
        .logo span { color: var(--primary); }
    </style>
</head>
<body>

    <div class="confirmacion-box">
        <a href="index.html" class="logo"><i class="fas fa-utensils"></i> DOMI<span>CILIO</span></a>
        
        <div class="icono-exito">
            <i class="fas fa-check"></i>
        </div>
        
        <h1>¡Pedido Enviado!</h1>
        <p>Tu pedido ha sido recibido y pronto nos pondremos en contacto contigo para confirmarlo.</p>
        
        <div class="info-box">
            <p><strong><i class="fas fa-clock"></i> Tiempo estimado:</strong> 30-45 minutos</p>
            <p><strong><i class="fas fa-phone"></i> Contacto:</strong> Te llamaremos al número proporcionado</p>
            <p><strong><i class="fas fa-info-circle"></i> Importante:</strong> Guarda tu comprobante de pago</p>
        </div>
        
        <a href="index.html" class="btn btn-primary">
            <i class="fas fa-utensils"></i> Hacer otro pedido
        </a>
        
        <br>
        
        <a href="https://wa.me/573005005306" class="btn btn-whatsapp" target="_blank">
            <i class="fab fa-whatsapp"></i> Contactar por WhatsApp
        </a>
    </div>

</body>
</html>
