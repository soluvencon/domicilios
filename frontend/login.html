<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ★ PWA -->
    <meta name="theme-color" content="#E63946">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="domicilios">
    <link rel="apple-touch-icon" href="assets/img/icon-152x152.png">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/img/icon-96x96.png">

    <title>Iniciar Sesión - DOMIDELIS</title>
    
    <!-- ★ FUENTES E ICONOS -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- ★ ESTILOS MODULARES -->
    <!-- 1. Cargamos global para obtener las variables (colores) y el reset básico -->
    <link rel="stylesheet" href="assets/css/global.css">
    <!-- 2. Cargamos el diseño específico del login -->
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>

    <div class="login-box">
        <a href="index.html" class="logo"><i class="fas fa-utensils"></i> DOMI<span>DELIS</span></a>
        <p class="subtitle">Ingresa tus credenciales para continuar</p>
        
        <div class="rol-info">
            <i class="fas fa-info-circle"></i>
            Acceso para administradores y domiciliarios
        </div>
        
        <div class="error" id="error"></div>
        
        <form id="formLogin">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Usuario</label>
                <input type="text" id="usuario" placeholder="Ej: Juan Pérez" required>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Contraseña</label>
                <input type="password" id="password" placeholder="Tu contraseña" required>
            </div>
            
            <button type="submit" id="btnLogin">
                <i class="fas fa-sign-in-alt"></i> Ingresar
            </button>
        </form>
        
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
    </div>

    <!-- ★ LÓGICA -->
    <script src="assets/js/config.js"></script>
    <script>
        document.getElementById("formLogin").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            const usuario = document.getElementById("usuario").value.trim();
            const password = document.getElementById("password").value.trim();
            const errorDiv = document.getElementById("error");
            const btn = document.getElementById("btnLogin");
            
            errorDiv.style.display = "none";
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando...';
            
            try {
                const url = `${API_URL}?action=login&nombre=${encodeURIComponent(usuario)}&password=${encodeURIComponent(password)}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.success) {
                    guardarSesion(data.rol, data.nombre, data.id);
                    
                    if (data.rol === "admin") {
                        window.location.href = "admin.html";
                    } else if (data.rol === "domiciliario") {
                        window.location.href = "domiciliario.html";
                    }
                } else {
                    errorDiv.textContent = data.error || "Credenciales incorrectas";
                    errorDiv.style.display = "block";
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Ingresar';
                }
            } catch (err) {
                errorDiv.textContent = "Error de conexión. Intenta de nuevo.";
                errorDiv.style.display = "block";
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Ingresar';
            }
        });
    </script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js').catch(() => {});
            });
        }
    </script>

</body>
</html>
